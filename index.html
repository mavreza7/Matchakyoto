<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matcha Fresh</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f7f7f7;
}

/* CONTAINER RESPONSIVE */
.container {
  max-width: 900px;
  width: 100%;
  margin: auto;
  padding: 15px;
  box-sizing: border-box;
}

/* HEADER */
.header {
  background: #6b8e23;
  color: white;
  padding: 25px 15px;
  border-radius: 0 0 20px 20px;
  text-align: center;
}

.header h1 {
  margin: 0;
  font-size: 22px;
}

.header p {
  margin-top: 5px;
  font-size: 14px;
}

/* MENU GRID RESPONSIVE */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 20px;
}

/* CARD */
.card {
  background: white;
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  text-align: left;
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
}

.card h3 {
  margin: 0;
  font-size: 16px;
}

.price {
  color: #6b8e23;
  font-weight: bold;
  margin-top: 5px;
}

/* BUTTON */
.btn {
  display: block;
  margin: 12px 0;
  padding: 14px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: bold;
  color: white;
  text-align: center;
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.03);
}

.wa { background: #25D366; }
.maps { background: #6b8e23; }
.menu { background: #333; }

/* FOOTER */
.footer {
  text-align: center;
  font-size: 12px;
  color: gray;
  margin-top: 20px;
}

/* ===================== */
/* RESPONSIVE BREAKPOINT */
/* ===================== */

/* HP kecil */
@media (max-width: 480px) {
  .grid {
    grid-template-columns: 1fr;
  }

  .header h1 {
    font-size: 20px;
  }
}

/* Tablet */
@media (min-width: 481px) and (max-width: 768px) {
  .grid {
    grid-template-columns: 2fr;
  }
}

/* Laptop besar */
@media (min-width: 1024px) {
  .container {
    max-width: 1000px;
  }

  .card h3 {
    font-size: 18px;
  }
}
</style>

</head>

<body>

<div class="container">

  <div class="header">
    <h1>🍵 MATCHA FRESH</h1>
    <p>Bekasi Utara • Fresh Daily</p>
  </div>

  <!-- MENU -->
  <div class="grid">

    <div class="card">
      <h3>Matcha Original</h3>
      <div class="price">Rp 10K</div>
    </div>

    <div class="card">
      <h3>Matcha Pinkberry</h3>
      <div class="price">Rp 12K</div>
    </div>

    <div class="card">
      <h3>Matcha Latte</h3>
      <div class="price">Rp 12K</div>
    </div>

    <div class="card">
      <h3>Matcha Seasalt</h3>
      <div class="price">Rp 15K</div>
    </div>

    <div class="card">
      <h3>Caramel Crumbel</h3>
      <div class="price">Rp 3K</div>
    </div>

    <div class="card">
      <h3>Seasalt Cream</h3>
      <div class="price">Rp 3K</div>
    </div>

  </div>

  <!-- BUTTON -->
  <a href="https://wa.me/6287775620146" class="btn wa">
    💬 Order WhatsApp
  </a>

  <a href="https://maps.app.goo.gl/wvKS5eaR32V3WFxc8" class="btn maps" target="_blank">
    📍 Lihat Lokasi
  </a>

  <div class="footer">
    © Matcha Fresh • All devices friendly 🍵
  </div>

</div>

</body>
</html>
